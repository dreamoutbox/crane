# crane.toml

[[nodes]]
name = "vps1"
public_ip = "10.0.0.11"
internal_ip = "10.0.0.11"
roles = ["app", "haproxy", "postgres", "redis"]
user = "crane"
ssh_ip = "127.0.0.1"
ssh_port = 2221
private_key = "keys/id_ed25519"
sudo_pass = "${SUDO_PASS_VPS1}"

[[nodes]]
name = "vps2"
public_ip = "10.0.0.12"
internal_ip = "10.0.0.12"
roles = ["app", "haproxy", "postgres", "redis"]
user = "crane"
ssh_ip = "127.0.0.1"
ssh_port = 2222
private_key = "keys/id_ed25519"
sudo_pass = "${SUDO_PASS_VPS2}"

[[nodes]]
name = "vps3"
public_ip = "10.0.0.13"
internal_ip = "10.0.0.13"
roles = ["app", "haproxy", "postgres", "redis"]
user = "crane"
ssh_ip = "127.0.0.1"
ssh_port = 2223
private_key = "keys/id_ed25519"
sudo_pass = "${SUDO_PASS_VPS3}"


[[users]]
name = "deployman"
groups = ["www"]
ssh_authorized_keys = ["keys/id_ed25519.pub"]
private_key = "keys/id_ed25519"


[app.myapp]
name = "myapp"
# Setup Info
dependencies = ["libssl3", "ca-certificates"]
# Deploy Info
deploy_dir = "./demo"
entrypoint = "./myapp"
pre_deploy_script = "./before-deploy.sh"
deploy_user = "deployman"
port_start = 3000
port_end = 3100
# Health Check
health_check_path = "/health"
health_check_timeout = 30
health_check_interval = 2
# Domain
domain = "myapp.localhost"
# Replicas
instances = 1
# ENV for myapp
[app.myapp.env]
APP_NAME = "myapp"
LOG_LEVEL = "debug"
# Databases for myapp
[[app.myapp.database]]
databases = "mydb"
user = "u1"
# [[app.myapp.database]]
# databases = "mydb"
# user = "u2"

[app.myapp2]
name = "myapp2"
# Setup Info
dependencies = ["libssl3", "ca-certificates"]
# Deploy Info
deploy_dir = "./demo"
entrypoint = "./myapp"
deploy_user = "deployman"
port_start = 4000
port_end = 4100
# Health Check
health_check_path = "/health"
health_check_timeout = 30
health_check_interval = 2
# Domain
domain = "myapp2.localhost"
# Replicas
instances = 2
# ENV for myapp2
[app.myapp2.env]
APP_NAME = "myapp2"
LOG_LEVEL = "debug"
# Databases for my app2
[[app.myapp2.database]]
databases = "mydb"
user = "u2"
[[app.myapp2.database]]
databases = "mydb"
user = "u1"


[db.postgres]
enabled = true
version = "17"
replica_pass = "replica"

[db.postgres.backup]
full_backup_every = "1h"
incremental_backup_every = "15m"

[db.postgres.mydb]
name = "mydb"


[[db.postgres.users]]
# state = "present" / "absent"
state = "present"
user = "u1"
password = "u1"
databases = ["mydb"]

[[db.postgres.users]]
state = "present"
user = "u2"
password = "u2"
databases = ["mydb"]


[backup.s3]
bucket = "crane1"
region = "us-east-1"
endpoint = "http://s3:9000"
access_key_id = "${S3_ACCESS_KEY_ID}"
secret_access_key = "${S3_SECRET_ACCESS_KEY}"


[domain]
provider = "cloudflare"
domain_name = "localhost"
token = "${CLOUDFLARE_TOKEN}"


