# crane.toml

[[nodes]]
name = "vps1"
host = "localhost"
public_ip = "localhost"
internal_ip = "10.0.0.11"
port = 2221
roles = ["app", "traefik", "postgres", "redis"]
user = "admin"

[[nodes]]
name = "vps2"
host = "localhost"
public_ip = "localhost"
internal_ip = "10.0.0.12"
port = 2222
roles = ["app", "traefik", "postgres", "redis"]
user = "admin"

# [[nodes]]
# name = "vps3"
