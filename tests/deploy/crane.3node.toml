# crane.toml

[[nodes]]
name = "vps1"
public_ip = "10.0.0.11"
internal_ip = "10.0.0.11"
roles = ["app", "haproxy", "postgres", "redis"]
user = "crane"
ssh_ip = "127.0.0.1"
ssh_port = 2221
private_key = "keys/id_ed25519"
sudo_pass = "${SUDO_PASS_VPS1}"

[[nodes]]
name = "vps2"
public_ip = "10.0.0.12"
internal_ip = "10.0.0.12"
roles = ["app", "haproxy", "postgres", "redis"]
user = "crane"
ssh_ip = "127.0.0.1"
ssh_port = 2222
private_key = "keys/id_ed25519"
sudo_pass = "${SUDO_PASS_VPS2}"

[[nodes]]
name = "vps3"
public_ip = "10.0.0.13"
internal_ip = "10.0.0.13"
roles = ["app", "haproxy", "postgres", "redis"]
user = "crane"
ssh_ip = "127.0.0.1"
ssh_port = 2223
private_key = "keys/id_ed25519"
sudo_pass = "${SUDO_PASS_VPS3}"


[db.postgres]
enabled = true
version = "17"
replica_pass = "replica"
[db.postgres.backup]
full_backup_every = "1h"
incremental_backup_every = "15m"
[db.postgres.mydb]
name = "mydb"
[[db.postgres.users]]
# state = "present" / "absent"
state = "present"
user = "u1"
password = "u1"
databases = ["mydb"]
[[db.postgres.users]]
state = "present"
user = "u2"
password = "u2"
databases = ["mydb"]


[backup.s3]
bucket = "crane1"
region = "us-east-1"
endpoint = "http://127.0.0.1:9000"
access_key_id = "miniominio"
secret_access_key = "miniominio"


[domain]
provider = "cloudflare"
domain_name = "localhost"
token = "${CLOUDFLARE_TOKEN}"


[app]
