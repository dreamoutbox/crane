# crane.toml

[[nodes]]
name = "vps1"
host = "localhost"
public_ip = "10.0.0.11"
internal_ip = "10.0.0.11"
port = 2221
roles = ["app", "haproxy", "postgres", "redis"]
user = "crane"
private_key = "keys/id_ed25519"

[db.postgres]
enabled = true
version = "17"

[db.postgres.backup]
full_backup_every = "1d"
incremental_backup_every = "1h"

[[db.postgres.users]]
user = "u1"
password = "new-password"
databases = ["mydb"]

[db.postgres.mydb]
name = "mydb"

[backup.s3]
bucket = "crane1"
region = "us-east-1"
endpoint = "http://s3:9000" # omit for AWS S3
# credentials in .env: S3_ACCESS_KEY_ID, S3_SECRET_ACCESS_KEY
# or specify here if not using .env
access_key_id = "miniominio"
secret_access_key = "miniominio"

[domain]
provider = "cloudflare"
domain_name = "example.com"

[monitor]
interval = 30

[monitor.autoscale]
min_replicas = 1
max_replicas = 4
scale_up_cpu = 80
scale_down_cpu = 20
scale_up_memory = 85
cooldown = 120

[app]
