# crane.toml

[[nodes]]
name = "vps1"
public_ip = "10.0.0.11"
internal_ip = "10.0.0.11"
ssh_ip = "127.0.0.1"
ssh_port = 2221
roles = ["app", "haproxy", "postgres", "redis"]
user = "crane"
private_key = "keys/id_ed25519"
sudo_pass = "${SUDO_PASS_VPS1}"


[db.postgres]
enabled = true
version = "17"
replica_pass = "replica"

[db.postgres.backup]
full_backup_every = "1d"
incremental_backup_every = "1h"

[[db.postgres.users]]
# state = "present" / "absent"
state = "present"
user = "u1"
password = "u1"
databases = ["mydb"]

[db.postgres.mydb]
name = "mydb"

[backup.s3]
bucket = "crane1"
region = "us-east-1"
endpoint = "http://s3:9000" # omit for AWS S3

access_key_id = "miniominio"
secret_access_key = "miniominio"

[domain]
provider = "cloudflare"
domain_name = "example.com"


[app]
