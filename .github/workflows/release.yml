name: Release

on:
  push:
    tags:
      - 'v[0-9]*'
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  SCCACHE_GHA_ENABLED: "true"

jobs:
  test:
    name: test / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest] # macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Setup sccache
        uses: mozilla/sccache-action@v0.0.9

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: nextest

      - name: Setup SSH keys
        if: runner.os != 'Windows'
        run: |
          KEYS_DIR="/home/runner/work/crane/crane/keys"
          mkdir -p "$KEYS_DIR"
          ssh-keygen -t ed25519 -C "crane-sim" -f "$KEYS_DIR/id_ed25519" -N ""
          cp "$KEYS_DIR/id_ed25519.pub" "$KEYS_DIR/authorized_keys"
          mkdir -p ~/.ssh
          cat >> ~/.ssh/config <<EOF

          # crane-vps

          Host *
            StrictHostKeyChecking no
            LogLevel ERROR

          Host vps1
            HostName localhost
            Port 2221
            User crane
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null

          Host vps2
            HostName localhost
            Port 2222
            User crane
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null

          Host vps3
            HostName localhost
            Port 2223
            User crane
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
          EOF

      - name: Test
        env:
          CLOUDFLARE_TOKEN: "CF_TOKEN_HERE"
          S3_ACCESS_KEY_ID: "miniominio"
          S3_SECRET_ACCESS_KEY: "miniominio"
          SUDO_PASS_VPS1: "cranepass"
          SUDO_PASS_VPS2: "cranepass"
          SUDO_PASS_VPS3: "cranepass"
        run: cargo nextest run --locked --no-capture --test-threads 1

  build:
    name: ${{ matrix.target }}
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux — native
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu

          # Linux — static musl (portable, no glibc dep)
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            use_cross: true

          # Linux — ARM64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            use_cross: true

          # # macOS — Apple Silicon (native on macos-latest)
          # - os: macos-latest
          #   target: aarch64-apple-darwin
            
          # # macOS — Intel (cross-compiled on M-series runner)
          # - os: macos-latest
          #   target: x86_64-apple-darwin

          # Windows — MSVC
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # sccache: skipped for cross targets (runs inside Docker; wrapper doesn't propagate)
      - name: Setup sccache
        if: ${{ !matrix.use_cross }}
        uses: mozilla/sccache-action@v0.0.9

      - name: Install cross
        if: ${{ matrix.use_cross }}
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build (native)
        if: ${{ !matrix.use_cross }}
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Build (cross)
        if: ${{ matrix.use_cross }}
        run: cross build --release --locked --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          BIN="target/${{ matrix.target }}/release/crane"
          ARCHIVE="crane-${{ github.ref_name }}-${{ matrix.target }}.tar.gz"
          tar -czf "$ARCHIVE" -C "$(dirname "$BIN")" "$(basename "$BIN")"
          echo "ASSET=$ARCHIVE" >> "$GITHUB_ENV"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $bin     = "target\${{ matrix.target }}\release\crane.exe"
          $archive = "crane-${{ github.ref_name }}-${{ matrix.target }}.zip"
          Compress-Archive -Path $bin -DestinationPath $archive
          "ASSET=$archive" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ASSET }}
          generate_release_notes: true
          fail_on_unmatched_files: true
