name: Release

on:
  push:
    tags:
      - 'v[0-9]*'
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  SCCACHE_GHA_ENABLED: "true"

jobs:
  test:
    name: test / ubuntu-latest
    runs-on: ubuntu-latest
    env:
      RUSTC_WRAPPER: sccache

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Setup sccache
        uses: mozilla/sccache-action@v0.0.9

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: nextest

      - name: Setup SSH keys
        if: runner.os != 'Windows'
        run: |
          KEYS_DIR="${{ github.workspace }}/keys"
          mkdir -p "$KEYS_DIR"
          ssh-keygen -t ed25519 -C "crane-sim" -f "$KEYS_DIR/id_ed25519" -N ""
          cp "$KEYS_DIR/id_ed25519.pub" "$KEYS_DIR/authorized_keys"
          mkdir -p ~/.ssh
          cat >> ~/.ssh/config <<EOF

          # crane-vps

          Host *
            StrictHostKeyChecking no
            LogLevel ERROR

          Host vps1
            HostName localhost
            Port 2221
            User crane
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null

          Host vps2
            HostName localhost
            Port 2222
            User crane
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null

          Host vps3
            HostName localhost
            Port 2223
            User crane
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
          EOF

      - name: Start Docker Compose and Setup MinIO
        if: runner.os == 'Linux'
        run: |
          docker compose -f docker-compose.dev.yml up -d
          ./setup-minio.sh

      - name: Debug Environment Information
        if: runner.os != 'Windows'
        run: |
          echo "================= Current User & ID ================="
          whoami
          id
          echo "================= SSH configuration ================="
          ls -la ${{ github.workspace }}/keys || true
          ls -la ~/.ssh || true
          cat ~/.ssh/config || true
          echo "=========== Docker & Docker Compose info ==========="
          docker --version || true
          docker compose version || true
          docker ps -a || true
          echo "===================================================="

      - name: Test
        if: runner.os != 'Windows'
        env:
          RUST_BACKTRACE: "1"
          CLOUDFLARE_TOKEN: "CF_TOKEN_HERE"
          S3_ACCESS_KEY_ID: "miniominio"
          S3_SECRET_ACCESS_KEY: "miniominio"
          SUDO_PASS_VPS1: "cranepass"
          SUDO_PASS_VPS2: "cranepass"
          SUDO_PASS_VPS3: "cranepass"
        # run specific tests first
        run: cargo nextest run test_app_instances_can_connect_each_other test_backup_restore_extend --locked --no-capture
        # test_single_deploy test_deploy 

  build:
    name: ${{ matrix.target }}
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux — native
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu

          # Linux — static musl (portable, no glibc dep)
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            use_cross: true

          # Linux — ARM64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            use_cross: true

          # macOS — Apple Silicon (native on macos-latest)
          - os: macos-latest
            target: aarch64-apple-darwin
            
          # macOS — Intel (cross-compiled on M-series runner)
          - os: macos-latest
            target: x86_64-apple-darwin

          # Windows — MSVC
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # sccache: skipped for cross targets (runs inside Docker; wrapper doesn't propagate)
      - name: Setup sccache
        if: ${{ !matrix.use_cross }}
        uses: mozilla/sccache-action@v0.0.9

      - name: Install cross
        if: ${{ matrix.use_cross }}
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build (native)
        if: ${{ !matrix.use_cross }}
        env:
          RUSTC_WRAPPER: sccache
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Build (cross)
        if: ${{ matrix.use_cross }}
        run: cross build --release --locked --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          BIN="target/${{ matrix.target }}/release/crane"
          ARCHIVE="crane-${{ github.ref_name }}-${{ matrix.target }}.tar.gz"
          tar -czf "$ARCHIVE" -C "$(dirname "$BIN")" "$(basename "$BIN")"
          echo "ASSET=$ARCHIVE" >> "$GITHUB_ENV"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $bin     = "target\${{ matrix.target }}\release\crane.exe"
          $archive = "crane-${{ github.ref_name }}-${{ matrix.target }}.zip"
          Compress-Archive -Path $bin -DestinationPath $archive
          "ASSET=$archive" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ASSET }}
          generate_release_notes: true
          fail_on_unmatched_files: true
